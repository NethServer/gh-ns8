name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o gh-ns8

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -n 1
